<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Builder</title>
    <link rel="stylesheet" href="css/variable.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
    <link rel="stylesheet" href="css/loader.css">
    <link rel="stylesheet" href="css/auth.css">
    <meta name="google-client-id" content="876191451638-p901bjf4i49flh0ugjmneu1or1lm7dkl.apps.googleusercontent.com">
</head>

<body>
    <div id="app">

    <!-- ── Auth Gate ── -->
    <div id="auth-gate">
        <div class="auth-layout">
            <div class="visual-panel">
                <img src="assets/images/logo/Logo.png" alt="FlowGram" class="auth-logo-float">
                <div class="visual-brand">
                    <div class="visual-brand-title">FlowGram</div>
                    <p class="visual-brand-sub">Sesi berakhir. Silakan masuk kembali.</p>
                </div>
            </div>
            <div class="form-panel">
                <div class="form-inner">
                    <div class="form-logo">
                        <span class="form-logo-text">FlowGram</span>
                    </div>
                    <h1 class="form-heading">Sesi berakhir</h1>
                    <p class="form-subheading">Masuk kembali untuk melanjutkan</p>
                    <button id="btn-google-auth" class="btn btn-google">
                        <svg class="google-icon" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Masuk dengan Google
                    </button>
                    <p id="auth-error" class="error-message"></p>
                    <button id="btn-demo" class="btn btn-demo">Coba tanpa akun (Demo)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loader-overlay">
        <div class="loader-spinner">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#6366F1" stroke-width="10" stroke-linecap="round"
                        stroke-dasharray="65 198" />
                </svg>
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#818CF8" stroke-width="10" stroke-linecap="round"
                        stroke-dasharray="50 198" />
                </svg>
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#A5B4FC" stroke-width="10" stroke-linecap="round"
                        stroke-dasharray="30 198" />
                </svg>
            </div>
        </div>

        <div id="toolbar">
            <img src="assets/images/logo/Logo.png" alt="FlowGram" class="tb-logo">
            <button class="tb-btn" id="btn-home" title="Kembali ke Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M3 11l9-8 9 8" />
                    <path d="M5 10v10h14V10" />
                </svg>
            </button>
            <div class="tb-sep"></div>
            <button class="tb-btn primary" id="btn-add-node" title="Tambah node">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                Node
            </button>
            <div class="tb-sep"></div>
            <button class="tb-btn" id="btn-zoom-out" title="Perkecil">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M5 12h14" />
                </svg>
            </button>
            <span class="tb-zoom-label" id="zoom-label">100%</span>
            <button class="tb-btn" id="btn-zoom-in" title="Perbesar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M12 5v14M5 12h14" />
                </svg>
            </button>
            <button class="tb-btn" id="btn-reset-view" title="Reset tampilan">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 1 9 9" />
                    <path d="M3 12v5h5" />
                </svg>
            </button>
            <div class="tb-sep"></div>
            <button class="tb-btn tb-hide-mobile" id="btn-export" title="Export JSON">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 3v12" />
                    <path d="M7 10l5 5 5-5" />
                    <path d="M5 21h14" />
                </svg>
                Export
            </button>
            <button class="tb-btn tb-hide-mobile" id="btn-import" title="Import JSON">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 21V9" />
                    <path d="M7 14l5-5 5 5" />
                    <path d="M5 3h14" />
                </svg>
                Import
            </button>
            <div class="tb-sep"></div>
            <button class="tb-btn tb-hide-mobile" id="btn-theme" title="Ganti tema">
                <svg class="tb-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4" />
                    <path
                        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
                </svg>
                <svg class="tb-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
            <button class="tb-btn tb-hide-mobile" id="btn-clear" title="Hapus semua">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M3 6h18" />
                    <path d="M8 6V4h8v2" />
                    <path d="M19 6l-1 14H6L5 6" />
                </svg>
            </button>
            <div class="tb-sep tb-hide-mobile"></div>
            <button class="tb-btn tb-show-mobile" id="btn-more" title="Lainnya">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="5" r="1" />
                    <circle cx="12" cy="12" r="1" />
                    <circle cx="12" cy="19" r="1" />
                </svg>
            </button>
        </div>

        <div id="canvas-wrapper">
            <div id="world">
                <svg id="conn-svg">
                    <defs>
                        <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7"
                            orient="auto-start-reverse">
                            <path d="M0,0 L10,5 L0,10 z"></path>
                        </marker>
                    </defs>
                    <g id="conn-group"></g>
                    <path id="temp-line" d=""></path>
                </svg>
                <div id="nodes-layer"></div>
            </div>
            <div id="empty-state">
                <div><b>Kanvas kosong.</b></div>
                <div>Klik <b>+ Node</b>, atau klik kanan di kanvas untuk menambah node.</div>
                <div>Tarik dari titik di tepi node untuk menghubungkan alur.</div>
                <div>Tahan <b>Shift</b> + drag untuk memilih banyak node sekaligus.</div>
            </div>
        </div>

        <input type="file" id="file-input" accept="application/json" hidden>
        <div id="toast"></div>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
